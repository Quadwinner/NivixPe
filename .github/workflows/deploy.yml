name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nivix-project/frontend/nivix-pay-old/package-lock.json

      - name: Install frontend dependencies
        working-directory: nivix-project/frontend/nivix-pay-old
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: nivix-project/frontend/nivix-pay-old
        env:
          REACT_APP_BRIDGE_URL: https://nivixpe.com
          CI: false
        run: npm run build

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/NivixPe
            git pull origin main

            # Install bridge-service deps
            cd ~/NivixPe/nivix-project/bridge-service
            npm install --production

            # Restart bridge service
            sudo systemctl restart bridge-service

      - name: Copy build to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "nivix-project/frontend/nivix-pay-old/build/*"
          target: "/tmp/nivix-build"
          strip_components: 4

      - name: Activate new build on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo rm -rf /var/www/nivix-frontend/*
            sudo cp -r /tmp/nivix-build/* /var/www/nivix-frontend/
            sudo chown -R www-data:www-data /var/www/nivix-frontend
            rm -rf /tmp/nivix-build
            sudo systemctl reload nginx
            echo "✅ Deployment complete"
